<div class="register-dialog">

  <div class="dialog-header">
    <h2>Register as Student</h2>
  </div>

  <form class="register-form" #studentForm="ngForm">

    <div class="form-group">
      <label [class.active]="student.name"></label>
      <input
        type="text"
        [(ngModel)]="student.name"
        name="name"
        required
        autocomplete="name"
        placeholder="Enter full name">
    </div>

    <div class="form-group">
      <label [class.active]="student.regId"></label>
      <input
        type="text"
        [(ngModel)]="student.regId"
        name="regId"
        required
        placeholder="Enter admission / register number">
    </div>

    <div class="form-group">
      <label [class.active]="student.dob"></label>
      <input
        type="text"
        [(ngModel)]="student.dob"
        name="dob"
        required
        placeholder="YYYY-MM-DD">
    </div>

    <div class="form-group">
      <label [class.active]="student.phone"></label>
      <input
        type="tel"
        [(ngModel)]="student.phone"
        name="phone"
        required
        placeholder="Enter 10-digit mobile number">
    </div>

    <div class="form-group">
      <label [class.active]="student.school">School</label>
      <select [(ngModel)]="student.school" name="school" required>
        <option value="" disabled selected hidden></option>
        <option *ngFor="let s of schools" [value]="s">{{ s }}</option>
      </select>
    </div>

    <div class="form-group">
      <label [class.active]="student.password"></label>
      <input
        type="password"
        [(ngModel)]="student.password"
        name="password"
        required
        placeholder="Create a secure password">
    </div>

    <div class="dialog-actions">
      <button type="button" class="cancel-btn" (click)="cancel()" [disabled]="loading">
        Cancel
      </button>
      <button type="button" class="register-btn" (click)="register()" [disabled]="loading || studentForm.invalid">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </div>

  </form>

</div>
