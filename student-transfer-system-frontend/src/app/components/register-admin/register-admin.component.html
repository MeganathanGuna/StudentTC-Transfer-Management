<div class="register-dialog">

  <div class="dialog-header">
    <h2>Register as School Admin / Staff</h2>
  </div>

  <form class="register-form" #adminForm="ngForm">

    <div class="form-group">
      <label [class.active]="admin.name"></label>
      <input
        type="text"
        [(ngModel)]="admin.name"
        name="name"
        required
        autocomplete="name"
        placeholder="Enter full name">
    </div>

    <div class="form-group">
      <label [class.active]="admin.empId"></label>
      <input
        type="text"
        [(ngModel)]="admin.empId"
        name="empId"
        required
        placeholder="Enter employee/staff ID">
    </div>

    <div class="form-group">
      <label [class.active]="admin.role"></label>
      <input
        type="text"
        [(ngModel)]="admin.role"
        name="role"
        required
        placeholder="Principal, Headmaster, Admin, etc.">
    </div>

    <div class="form-group">
      <label [class.active]="admin.school">Select School</label>
      <select [(ngModel)]="admin.school" name="school" required>
        <option value="" disabled selected hidden></option>
        <option *ngFor="let s of schools" [value]="s">{{ s }}</option>
      </select>
    </div>

    <div class="form-group">
      <label [class.active]="admin.password"></label>
      <input
        type="password"
        [(ngModel)]="admin.password"
        name="password"
        required
        placeholder="Create a secure password">
    </div>

    <div class="dialog-actions">
      <button type="button" class="cancel-btn" (click)="cancel()" [disabled]="loading">
        Cancel
      </button>
      <button type="button" class="register-btn" (click)="register()" [disabled]="loading || adminForm.invalid">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </div>

  </form>

</div>
